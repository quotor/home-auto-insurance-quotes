name: Publish to MCP Registry

# Publishes server.json to the official Model Context Protocol registry
# (registry.modelcontextprotocol.io). Auth is GitHub OIDC — no secrets needed —
# which proves ownership of the io.github.quotor/* namespace because this repo
# lives in the `quotor` GitHub org. Runs on a version tag or manual dispatch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --help

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Login (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish
        run: ./mcp-publisher publish
